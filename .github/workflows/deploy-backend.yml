name: Deploy Backend to AWS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Lint
        run: cd backend && npm run lint

      - name: Type-check
        run: cd backend && npx tsc --noEmit

      - name: Run tests with coverage
        run: cd backend && npm test -- --coverage --coverageReporters=text --coverageReporters=json-summary

      - name: Enforce coverage threshold
        run: |
          cd backend
          COVERAGE=$(node -e "
            const r = require('./coverage/coverage-summary.json');
            console.log(r.total.statements.pct);
          ")
          echo "Statement coverage: ${COVERAGE}%"
          node -e "
            const r = require('./coverage/coverage-summary.json');
            const s = r.total.statements.pct;
            const b = r.total.branches.pct;
            if (s < 80) { console.error('Statements ' + s + '% < 80%'); process.exit(1); }
            if (b < 70) { console.error('Branches ' + b + '% < 70%'); process.exit(1); }
            console.log('Coverage OK: statements=' + s + '%, branches=' + b + '%');
          "

  deploy:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    environment: production
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  health-check:
    name: Post-deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 5

    steps:
      - name: Wait for deployment propagation
        run: sleep 30

      - name: Health check
        id: health
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_URL }}/health" || true)
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Rollback on failure
        if: failure()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Push previous image as latest
        if: failure()
        run: |
          echo "::error::Health check failed — manual rollback required."
          echo "To rollback, re-tag a previous working image as 'latest' and redeploy."
          echo "Previous commit images are tagged by SHA in ECR."
          exit 1
