# =============================================================================
# Observability Stack - Production Template
# =============================================================================
# Deploy via Coolify as a Docker Compose service.
# All ports are internal-only; expose through Coolify/Traefik reverse proxy.
#
# Required env vars (set in Coolify or .env):
#   GRAFANA_ADMIN_PASSWORD  - Grafana admin password (never use default)
#   APP_METRICS_TARGET      - NestJS /metrics endpoint (e.g. app:3000)
#
# Optional env vars:
#   GRAFANA_PORT            - Grafana listen port (default: 3001)
#   PROMETHEUS_PORT         - Prometheus listen port (default: 9090)
#   LOKI_PORT               - Loki listen port (default: 3100)
#   UPTIME_KUMA_PORT        - Uptime Kuma listen port (default: 3002)
#   PROMETHEUS_RETENTION    - Prometheus data retention (default: 30d)
#   LOKI_RETENTION          - Loki log retention (default: 720h = 30d)
#   MONGO_INITDB_ROOT_USERNAME - MongoDB root username (default: admin)
#   MONGO_INITDB_ROOT_PASSWORD - MongoDB root password (required)
# =============================================================================

networks:
  observability:
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  uptime_kuma_data:
  mongodb_data:

services:
  # ---------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.4
    container_name: prometheus
    restart: unless-stopped
    user: "65534:65534"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.listen-address=0.0.0.0:9090"
      - "--web.enable-lifecycle"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Loki - Log Aggregation
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.4.3
    container_name: loki
    restart: unless-stopped
    user: "10001:10001"
    command:
      - "-config.file=/etc/loki/loki-config.yml"
      - "-config.expand-env=true"
    environment:
      - LOKI_RETENTION=${LOKI_RETENTION:-720h}
    volumes:
      - loki_data:/loki
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Promtail - Ships Docker Logs to Loki
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.4.3
    container_name: promtail
    restart: unless-stopped
    command:
      - "-config.file=/etc/promtail/promtail-config.yml"
      - "-config.expand-env=true"
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - observability
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Grafana - Dashboards & Alerting
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    user: "472:472"
    environment:
      - GF_SERVER_HTTP_PORT=${GRAFANA_PORT:-3001}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_LOG_LEVEL=warn
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - observability
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${GRAFANA_PORT:-3001}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Uptime Kuma - Status Page & Uptime Monitoring
  # ---------------------------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.16
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get({host:'localhost',port:3001,path:'/api/health',timeout:2000},r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # PostgreSQL Backup to S3 (runs every 6 hours)
  # ---------------------------------------------------------------------------
  pg-backup:
    image: postgres:17-alpine
    container_name: pg-backup
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache aws-cli && \
        echo "0 */6 * * * /opt/backup/pg-backup-s3.sh >> /var/log/pg-backup.log 2>&1" | crontab - && \
        crond -f -l 2
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - S3_BACKUP_BUCKET=${S3_BACKUP_BUCKET:?S3_BACKUP_BUCKET is required}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - S3_BACKUP_PREFIX=${S3_BACKUP_PREFIX:-postgres/}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - APP_NAME=${APP_NAME:-ofinanceiro}
    volumes:
      - ./monitoring/backup/pg-backup-s3.sh:/opt/backup/pg-backup-s3.sh:ro
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # MongoDB - Logs & Analytics Database
  # ---------------------------------------------------------------------------
  # Banco dedicado para analytics_events e audit_logs.
  # Separado do PostgreSQL para não impactar performance do banco principal.
  # O backend se conecta via MONGODB_URL env var.
  mongodb:
    image: mongo:7.0
    container_name: mongodb-logs
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: app_logs
    volumes:
      - mongodb_data:/data/db
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
