version: 1
appRoot: frontend
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npm run lint
        - npm test -- --watchAll=false --passWithNoTests
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
customHeaders:
  - pattern: '**/*'
    headers:
      - key: Strict-Transport-Security
        value: 'max-age=31536000; includeSubDomains; preload'
      - key: X-Frame-Options
        value: 'DENY'
      - key: X-Content-Type-Options
        value: 'nosniff'
      - key: Referrer-Policy
        value: 'strict-origin-when-cross-origin'
  - pattern: '/assets/*'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
