<svg width="300" height="200" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card -->
  <rect x="20" y="20" width="260" height="160" rx="12" fill="white" stroke="#E5E7EB"/>

  <!-- Form Header -->
  <text x="40" y="50" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#374151">Criar Projeto</text>

  <!-- Input 1 -->
  <rect x="40" y="65" width="220" height="36" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="52" y="88" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">Nome do projeto</text>

  <!-- Input 2 -->
  <rect x="40" y="110" width="220" height="36" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="52" y="133" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">Dominio (ex: meuapp.com)</text>

  <!-- Button -->
  <rect x="40" y="155" width="100" height="32" rx="6" fill="#0f172a"/>
  <text x="62" y="176" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="white">Criar</text>

  <!-- Checkmark -->
  <circle cx="260" cy="40" r="12" fill="#10B981"/>
  <path d="M254 40L258 44L266 36" stroke="white" stroke-width="2" fill="none"/>
</svg>
