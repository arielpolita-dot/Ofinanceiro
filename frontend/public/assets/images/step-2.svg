<svg width="300" height="200" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal -->
  <rect x="20" y="20" width="260" height="160" rx="12" fill="#1E1E1E"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="260" height="28" rx="12" fill="#323233"/>
  <circle cx="38" cy="34" r="5" fill="#FF5F56"/>
  <circle cx="54" cy="34" r="5" fill="#FFBD2E"/>
  <circle cx="70" cy="34" r="5" fill="#27CA40"/>

  <!-- Terminal content -->
  <text x="35" y="70" font-family="monospace" font-size="10" fill="#10B981">$</text>
  <text x="50" y="70" font-family="monospace" font-size="10" fill="#D4D4D4">npm install @authify/sdk</text>

  <text x="35" y="95" font-family="monospace" font-size="10" fill="#6B7280">+ @authify/sdk@1.2.0</text>
  <text x="35" y="110" font-family="monospace" font-size="10" fill="#6B7280">added 3 packages in 2s</text>

  <text x="35" y="140" font-family="monospace" font-size="10" fill="#10B981">$</text>
  <text x="50" y="140" font-family="monospace" font-size="10" fill="#D4D4D4">_</text>

  <!-- Success badge -->
  <rect x="180" y="150" width="80" height="20" rx="4" fill="#10B981"/>
  <text x="195" y="164" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="white">Installed!</text>
</svg>
