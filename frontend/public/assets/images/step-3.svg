<svg width="300" height="200" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Login Form Preview -->
  <rect x="20" y="20" width="260" height="160" rx="12" fill="white" stroke="#E5E7EB"/>

  <!-- Logo -->
  <circle cx="150" cy="45" r="15" fill="#0f172a"/>
  <text x="143" y="51" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="white">A</text>

  <!-- Title -->
  <text x="115" y="75" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151">Entrar</text>

  <!-- Email input -->
  <rect x="50" y="85" width="200" height="28" rx="4" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="60" y="104" font-family="Inter, sans-serif" font-size="9" fill="#9CA3AF">Email</text>

  <!-- Password input -->
  <rect x="50" y="118" width="200" height="28" rx="4" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="60" y="137" font-family="Inter, sans-serif" font-size="9" fill="#9CA3AF">Senha</text>

  <!-- Login Button -->
  <rect x="50" y="152" width="200" height="28" rx="4" fill="#0f172a"/>
  <text x="128" y="171" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="white">Entrar</text>

  <!-- OAuth buttons hint -->
  <rect x="50" y="185" width="95" height="24" rx="4" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="72" y="201" font-family="Inter, sans-serif" font-size="8" fill="#6B7280">Google</text>

  <rect x="155" y="185" width="95" height="24" rx="4" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="178" y="201" font-family="Inter, sans-serif" font-size="8" fill="#6B7280">GitHub</text>

  <!-- Live badge -->
  <rect x="220" y="25" width="50" height="18" rx="4" fill="#10B981"/>
  <text x="230" y="38" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="white">LIVE</text>
</svg>
