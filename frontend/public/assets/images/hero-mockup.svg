  <rect x="254" y="230" width="16" height="40" rx="2" fill="#0f172a" opacity="0.7"/>
  <rect x="276" y="235" width="16" height="35" rx="2" fill="#0f172a" opacity="0.8"/>
  <rect x="298" y="220" width="16" height="50" rx="2" fill="#0f172a" opacity="0.9"/>
  <rect x="320" y="225" width="16" height="45" rx="2" fill="#0f172a"/>
  <rect x="342" y="210" width="16" height="60" rx="2" fill="#10B981"/>

  <!-- User List -->
