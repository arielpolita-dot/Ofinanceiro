# =============================================================================
# Grafana Datasource Provisioning
# =============================================================================
# Auto-provisions Prometheus and Loki on first boot.
# Targets use Docker service names on the observability network.
# =============================================================================

apiVersion: 1

deleteDatasources: []

datasources:
  # ---------------------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------------------
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # ---------------------------------------------------------------------------
  # Loki
  # ---------------------------------------------------------------------------
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: prometheus
          matcherRegex: "traceID=(\\w+)"
          name: TraceID
          url: ""
