# =============================================================================
# Promtail Configuration
# =============================================================================
# Scrapes Docker container logs via the Docker socket and journal.
# Automatically discovers containers and labels logs by container name/image.
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # ---------------------------------------------------------------------------
  # Docker Container Logs (via Docker socket)
  # ---------------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: status
            values: ["running"]
    relabel_configs:
      # Use container name as the primary label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"

      # Add the image name
      - source_labels: ["__meta_docker_container_image"]
        target_label: "image"

      # Add compose service name if available
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "compose_service"

      # Add compose project name if available
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "compose_project"

      # Drop containers explicitly labeled to exclude from logging
      - source_labels: ["__meta_docker_container_label_logging"]
        regex: "false"
        action: drop

    pipeline_stages:
      # Try to parse JSON logs (NestJS default with pino/winston)
      - json:
          expressions:
            level: level
            msg: msg
            message: message
            timestamp: timestamp
            context: context
            err: err

      # Fallback: if level was not extracted, use "info"
      - template:
          source: level
          template: "{{ if .level }}{{ .level }}{{ else }}info{{ end }}"

      # Map level to Loki label
      - labels:
          level:

      # Use extracted timestamp if available
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05.000Z"
            - UnixMs
          action_on_failure: fudge

      # Output: prefer msg, fall back to message, then full line
      - output:
          source: msg

  # ---------------------------------------------------------------------------
  # System logs (syslog)
  # ---------------------------------------------------------------------------
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog
